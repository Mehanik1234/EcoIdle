<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Idle Game</title>

<style>
body {
    margin: 0;
    height: 100vh;
    padding: 250px 20px;
    background-color: rgb(90, 90, 90);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    transition: background-color 1s;
}

body.clean {
    background-color: #5a8f5a;
}

body.lesspolluted {
    background-color: #658f2a;
}

body.polluted {
    background-color: #7a7a3a;
}

body.lessdirty {
    background-color: #7a613a;
}
body.dirty {
    background-color: #5f4a3a;
}

body.toxic {
    background-color: #3a3a3a;
}
body.dead {
    background-color: rgb(34, 34, 34);
}

.game.shake {
    animation: reactorShake 0.55s linear;
}

@keyframes reactorShake {
    0% { transform: translate(0, 0); }
    10% { transform: translate(-6px, 4px); }
    20% { transform: translate(6px, -4px); }
    30% { transform: translate(-5px, -3px); }
    40% { transform: translate(5px, 3px); }
    50% { transform: translate(-4px, 2px); }
    60% { transform: translate(4px, -2px); }
    70% { transform: translate(-3px, 1px); }
    80% { transform: translate(3px, -1px); }
    90% { transform: translate(-2px, 1px); }
    100% { transform: translate(0, 0); }
}

#flash {
    position: fixed;
    inset: 0;
    background: #ffffff;
    opacity: 0;
    pointer-events: none;
    z-index: 1200;
}

body.flash #flash {
    animation: reactorFlash 0.6s ease;
}

@keyframes reactorFlash {
    0% { opacity: 0; }
    15% { opacity: 0.9; }
    100% { opacity: 0; }
}

.game {
    background: #2e2e2e;
    padding: 45px;
    border-radius: 12px;
    width: 400px;
    text-align: center;
    background: linear-gradient(145deg, #2e2e2e, #3a3a3a);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    padding: 45px;
    border-radius: 20px;
    position: relative;
}

.resource {
    font-size: 18px;
    margin: 6px 0;
}

.resource.small {
    font-size: 14px;
    opacity: 0.9;
}

.status-wrap {
    margin: 12px 0;
    text-align: left;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 8px 10px;
}

.meter {
    width: 100%;
    height: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
}

.meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #62d96b, #e6b422, #d94d4d);
    transition: width 0.3s ease;
}

.event-log {
    margin-top: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: left;
    max-height: 120px;
    overflow-y: auto;
    font-size: 13px;
}

.event-item {
    margin: 4px 0;
    border-left: 2px solid rgba(255,255,255,0.35);
    padding-left: 6px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    background: #4caf50;
    color: white;
}

button:disabled {
    background: #777;
    cursor: not-allowed;
}

.box {
    background: #2e2e2e;
    padding: 25px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
}

.button-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr; /* две колонки */
    gap: 5px;
}

.category-bar {
    display: flex;
    gap: 6px;
    margin: 10px 0 6px;
    width: 100%;
}

.category-bar button {
    flex: 1;
    padding: 8px 6px;
    margin-top: 0;
    font-size: 13px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
}

.category-bar button.active {
    background: #4caf50;
    border-color: #4caf50;
}

.loading-screen {
    position: fixed;
    inset: 0;
    background-color: rgb(90, 90, 90);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 1000;
    opacity: 1;
    transition: opacity 0.25s ease;
}

.loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
}

.info-toggle {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 38px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-direction: column;
    cursor: pointer;
}

.info-toggle span {
    width: 18px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    opacity: 0.9;
}

.info-panel {
    margin: 10px 0 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    text-align: left;
    max-height: 0;
    overflow: hidden;
    padding: 0 10px;
    transition: max-height 0.25s ease, padding 0.25s ease;
}

.info-panel.open {
    max-height: 360px;
    padding: 8px 10px;
}

.info-panel .resource {
    margin: 4px 0;
}

/* Контейнер дыма */
#smoke {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 999;
    display: none;
}

/* Одна частица дыма */
.smoke-particle {
    position: absolute;
    bottom: -100px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(180,180,180,0.35) 0%, rgba(180,180,180,0.15) 40%, transparent 70%);
    border-radius: 50%;
    animation: smokeRise linear infinite;
    filter: blur(8px);
}

@keyframes smokeRise {
    0% {
        transform: translateY(0) translateX(0) scale(0.8);
        opacity: 0.6;
    }
    100% {
        transform: translateY(-120vh) translateX(200px) scale(1.8);
        opacity: 0;
    }
}


</style>
</head>

<body>

<audio id="bgmusic" src="bgmusic.mp3" loop autoplay></audio>

<div id="loadingScreen" class="loading-screen">Loading...</div>
<div id="flash" aria-hidden="true"></div>

<div class="game">
    <h1>Idle Game</h1>

    <button class="info-toggle" id="infoToggle" aria-label="Toggle info" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="resource">💰 Coins: <span id="coins">0</span></div>
    <div class="resource">🌫 Pollution: <span id="pollution">0</span></div>
    <div class="resource">📅 Days: <span id="days">0</span></div>

    <div class="info-panel" id="infoPanel">
        <div class="resource">population: <span id="population">1000</span></div>  
        <div class="resource">population growth: <span id="populationPS">50</span></div>  
        <div class="resource">Taxs: <span id="minuscoins">10</span></div>
        <div class="resource">Coins: +<span id="perSecond">0</span>/sec</div>
        <div class="resource small">Multiplier: x<span id="multiplier">1.00</span></div>
        <div class="resource">Pollution: +<span id="pollutionPerSec">0</span>/tick</div>
        <div class="resource">pollution reduction: -<span id="pollutionReduction">0</span>/tick</div>
        <div class="resource small">Owned: Coal <span id="coalCount">0</span> | S <span id="smallFactoryCount">0</span> | M <span id="mediumFactoryCount">0</span> | B <span id="bigFactoryCount">0</span> | Oil <span id="oilCount">0</span> | Nuke <span id="nuclearCount">0</span></div>
        <div class="resource small">Goal: reach <span id="nextMilestone">5,000</span> coins for reward</div>
    </div>

    <div class="status-wrap">
        <div class="resource small">Eco status: <span id="ecoStatus">Clean</span></div>
        <div class="meter"><div id="pollutionMeter" class="meter-fill"></div></div>
    </div>

    <button onclick="clickCoin()">Click</button>

    <div class="category-bar" id="categoryBar">
        <button type="button" data-filter="all" class="active">Все</button>
        <button type="button" data-filter="polluting">Загрязняющие</button>
        <button type="button" data-filter="cleaning">Очищающие</button>
        <button type="button" data-filter="other">Прочее</button>
        <button type="button" data-filter="polite">политические</button>
    </div>

    <div class="button-grid">
        <button onclick="buyUpgrade()" id="upgradeBtn" data-category="other">Small Market (+1/sec) - <span id="upgradeCost">10</span></button>
        <button onclick="buyMarket()" id="MarketBtn" data-category="other">Medium Market (+2/sec) - <span id="MarketCost">15</span></button>
        <button onclick="buyBigMarket()" id="BMarketBtn" data-category="other">Big Market (+4/sec) - <span id="BMarketCost">100</span></button>
        <button onclick="buyCoal()" id="CoalBtn" data-category="polluting">Coal Power Plant (+8/sec) - <span id="CoalCost">150</span></button>
        <button onclick="buySFactory()" id="SfactoryBtn" data-category="polluting">Small Factory (+10/sec) - <span id="SfactoryCost">300</span></button>
        <button onclick="buyMFactory()" id="MfactoryBtn" data-category="polluting">Medium Factory (+20/sec) - <span id="MfactoryCost">500</span></button>
        <button onclick="buyBFactory()" id="BfactoryBtn" data-category="polluting">Big Factory (+40/sec) - <span id="BfactoryCost">800</span></button>
        <button onclick="buyOil()" id="OilBtn" data-category="polluting">Oil Refinery (+60/sec) - <span id="OilCost">800</span></button>
        <button onclick="buyNuclear()" id="NuclearBtn" data-category="polluting">Nuclear power plant (+100/sec) - <span id="NuclearCost">3000</span></button>
        <button onclick="buyNuclear2()" id="Nuclear2Btn" data-category="polluting">Antimatter Reactor(+300/sec) - <span id="Nuclear2Cost">6000</span></button>
        <button onclick="buyPlusCoins()" id="pCoinsBtn" data-category="other">Reduce fines (-5) - <span id="pCoinsCost">200</span></button>
        <button onclick="buyFarm()" id="FarmBtn" data-category="cleaning">Farm (-0.5 pollution) - <span id="FarmCost">100</span></button>
        <button onclick="buyMP()" id="MPBtn" data-category="cleaning">Pollution treatment plant (-1 pollution) - <span id="MPCost">500</span></button>
        <button onclick="buyMP2()" id="MPBtn2" data-category="cleaning">Environmental Cleanup Facility (-2 pollution) - <span id="MPCost2">800</span></button>
        <button onclick="buyMP3()" id="MPBtn3" data-category="cleaning">Planetary Cleanser (-5 pollution) - <span id="MPCost3">1100</span></button>


    </div>

        <div class="button-grid">
            <button onclick="useIndustrialSupport()" id="policyIndustrial" data-category="polite">Industrial Support (+10 pollution growth, +0.5% multiplier)</button>
            <button onclick="usePublicTransport()" id="policyTransport" data-category="polite">Public Transport Project (+25 population growth, +5 pollution)</button>
            <button onclick="useBusinessGrants()" id="policyGrants" data-category="polite">Business Grants (-50,000 coins, +2% multiplier)</button>
        </div>
        <div class="resource small" id="policyStatus"></div>

    <button onclick="resetSave()">Reset Save</button>

    <div class="event-log" id="eventLog"></div>

    <div id="smoke"></div>
    
</div>

<script>
const bgm = document.getElementById("bgmusic");
if (bgm) {
    bgm.volume = 0.35;
    const tryPlay = () => bgm.play().catch(() => {});
    window.addEventListener("load", tryPlay);
    document.addEventListener("click", tryPlay, { once: true });
    document.addEventListener("keydown", tryPlay, { once: true });
}

let coins = 1;
let days = 0;
let minuscoins = 10;

// income
let cps1 = 1, cps2 = 0, cps3 = 0, cps4 = 0, cps5 = 0, cps6 = 0, cps7 = 0, cps8 = 0, cps9 = 0, cps10 = 0, cps11 = 0;

let allowSave = true;

// pollution
let pollution = 0;
let pollutionPerSecond = 0;
let pollutionReduction = 0;
let pollutionLevel = 0;

//population
let population = 1000;
let basePopulationPS = 50;
let populationPS = basePopulationPS;

//building
let smallFactories = 0;
let mediumFactories = 0;
let CoalPlants = 0;
let bigFactories = 0;
let oilCount = 0;
let Nuclears = 0;
let oilIncomeBonus = 0;
let populationMultiplier = 1;
let incomeMultiplier = 1;
let policyMultiplierBonus = 0;
let eventLog = [];
const milestones = [5000, 25000, 100000, 300000, 1000000];
let milestoneIndex = 0;

// policies
const policyCooldownDays = 30;
let industrialLastUsedDay = -Infinity;
let transportLastUsedDay = -Infinity;
let grantsLastUsedDay = -Infinity;
 
// costs
let upgradeCost = 10;
let MarketCost = 15;
let BMarketCost = 100;
let CoalCost = 150;
let SfactoryCost = 300;
let MfactoryCost = 500;
let BfactoryCost = 800;
let OilCost = 1000;
let NuclearCost = 3000;
let Nuclear2Cost = 6000;
let pCoinsCost = 200;
let FarmCost = 100;
let MPCost = 500;
let MPCost2 = 800
let MPCost3 = 1100

function formatNum(value) {
    return Math.floor(value).toLocaleString("en-US");
}

function recalculateMultiplier() {
    incomeMultiplier = (1 + oilIncomeBonus + policyMultiplierBonus) * populationMultiplier;
}

function addEvent(text) {
    eventLog.unshift(`[Day ${days}] ${text}`);
    if (eventLog.length > 8) eventLog.pop();
}

function canUsePolicy(lastUsedDay) {
    return days >= lastUsedDay + policyCooldownDays;
}

function policyCooldownLeft(lastUsedDay) {
    return Math.max(0, (lastUsedDay + policyCooldownDays) - days);
}

const secretWord = "ECO";
let secretBuffer = "";
window.addEventListener("keydown", (e) => {
    if (!e.key || e.key.length !== 1) return;
    secretBuffer = (secretBuffer + e.key.toUpperCase()).slice(-secretWord.length);
    if (secretBuffer === secretWord) {
        addEvent("Easter egg: green code unlocked.");
        updateUI();
    }
});

function checkMilestones() {
    if (milestoneIndex >= milestones.length) return;
    const target = milestones[milestoneIndex];
    if (coins >= target) {
        const reward = Math.floor(target * 0.15);
        coins += reward;
        milestoneIndex++;
        addEvent(`City milestone reached: ${formatNum(target)} coins. Reward +${formatNum(reward)}.`);
    }
}

// click
function clickCoin() {
    coins++;
    updateUI();
}

// upgrades
function buyUpgrade() {
    if (coins >= upgradeCost) {
        coins -= upgradeCost;
        cps1 += 1;
        basePopulationPS++;
        upgradeCost = Math.floor(upgradeCost * 1.12);
        updateUI();
    }
}

function buyMarket() {
    if (coins >= MarketCost) {
        coins -= MarketCost;
        cps2 += 2;
        basePopulationPS++;
        MarketCost = Math.floor(MarketCost * 1.1);
        updateUI();
    }
}

function buyBigMarket() {
    if (coins >= BMarketCost) {
        coins -= BMarketCost;
        cps3 += 4;
        basePopulationPS++;
        BMarketCost = Math.floor(BMarketCost * 1.09);
        updateUI();
    }
}

function buyCoal() {
    if (coins >= CoalCost) {
        coins -= CoalCost;
        CoalPlants++;
        cps9 = CoalPlants * 8;
        pollutionPerSecond += 0.5;
        CoalCost = Math.floor(CoalCost * 1.09);
        updateUI();
    }
}

function buySFactory() {
    if (coins >= SfactoryCost) {
        coins -= SfactoryCost;
        smallFactories++;
        cps4 = smallFactories * 10;
        pollutionPerSecond += 1;
        SfactoryCost = Math.floor(SfactoryCost * 1.09);
        updateUI();
    }
}

function buyMFactory() {
    if (coins >= MfactoryCost) {
        coins -= MfactoryCost;
        mediumFactories++;
        cps5 = mediumFactories * 20;
        pollutionPerSecond += 2;
        MfactoryCost = Math.floor(MfactoryCost * 1.09);
        updateUI();
    }
}

function buyBFactory() {
    if (coins >= BfactoryCost) {
        coins -= BfactoryCost;
        bigFactories++;
        cps6 = bigFactories * 40
        pollutionPerSecond += 3;
        BfactoryCost = Math.floor(BfactoryCost * 1.1);
        updateUI();
    }
}

function buyOil() {
    if (coins >= OilCost) {
        coins -= OilCost;

        oilCount++;
        cps10 = oilCount * 60;

        oilIncomeBonus = oilCount * 0.01;
        recalculateMultiplier();

        pollutionPerSecond += 6;
        OilCost = Math.floor(OilCost * 1.2);
        updateUI();
    }
}


function buyNuclear() {
    if (coins >= NuclearCost) {
        coins -= NuclearCost;
        Nuclears++;
        cps7 = Nuclears * 100;
        pollutionPerSecond += 5;
        NuclearCost = Math.floor(NuclearCost * 1.09);
        updateUI();
    }
}

function buyNuclear2() {
    if (coins >= Nuclear2Cost) {
        coins -= Nuclear2Cost;
        cps8 += 300;
        pollutionPerSecond += 10;
        Nuclear2Cost = Math.floor(Nuclear2Cost * 1.07);
        updateUI();
    }
}

function buyPlusCoins() {
    if (coins >= pCoinsCost) {
        coins -= pCoinsCost;
        minuscoins = Math.max(0, minuscoins - 5);
        pCoinsCost = Math.floor(pCoinsCost * 1.2);
        updateUI();
    }
}

function buyFarm() {
    if (coins >= FarmCost) {
        coins -= FarmCost;
        basePopulationPS += 5
        pollutionReduction += 0.5
        cps9 += 5
        FarmCost = Math.floor(FarmCost * 1.07)
        updateUI()
    }
}

function buyMP() {
    if (coins >= MPCost) {
        coins -= MPCost;
        pollutionReduction += 1;
        pollution -= 1; 
        if (pollution < 0) pollution = 0;
        MPCost = Math.floor(MPCost * 1.1);
        updateUI();
    }
}

function buyMP2() {
    if (coins >= MPCost2) {
        coins -= MPCost2;
        pollutionReduction += 2;
        pollution -= 2; 
        if (pollution < 0) pollution = 0;
        MPCost2 = Math.floor(MPCost2 * 1.1);
        updateUI();
    }
}

function buyMP3() {
    if (coins >= MPCost3) {
        coins -= MPCost3;
        pollutionReduction += 5;
        pollution -= 5; 
        if (pollution < 0) pollution = 0;
        MPCost3 = Math.floor(MPCost3 * 1.1);
        updateUI();
    }
}

function useIndustrialSupport() {
    if (!canUsePolicy(industrialLastUsedDay)) return;
    industrialLastUsedDay = days;
    pollutionPerSecond += 10;
    policyMultiplierBonus += 0.005;
    recalculateMultiplier();
    addEvent("Policy: Industrial Support enacted.");
    updateUI();
}

function usePublicTransport() {
    if (!canUsePolicy(transportLastUsedDay)) return;
    transportLastUsedDay = days;
    basePopulationPS += 25;
    populationPS = basePopulationPS;
    pollution += 5;
    addEvent("Policy: Public Transport Project launched.");
    updateUI();
}

function useBusinessGrants() {
    if (!canUsePolicy(grantsLastUsedDay)) return;
    if (coins < 50000) return;
    grantsLastUsedDay = days;
    coins -= 50000;
    policyMultiplierBonus += 0.02;
    recalculateMultiplier();
    addEvent("Policy: Business Grants approved.");
    updateUI();
}

function resetSave() {
    if (confirm("Delete save?")) {
        allowSave = false;
        localStorage.removeItem("idleGameSave");
        addEvent("Save deleted.");
        location.reload();
    }
}

function triggerReactorExplosionEffect() {
    const gameEl = document.querySelector(".game");
    if (gameEl) {
        gameEl.classList.remove("shake");
        void gameEl.offsetWidth;
        gameEl.classList.add("shake");
    }
    document.body.classList.remove("flash");
    void document.body.offsetWidth;
    document.body.classList.add("flash");
    setTimeout(() => {
        if (gameEl) gameEl.classList.remove("shake");
        document.body.classList.remove("flash");
    }, 650);
}

function loadGame() {
    const rawSave = localStorage.getItem("idleGameSave");
    if (!rawSave) return;

    let save;
    try {
        save = JSON.parse(rawSave);
    } catch {
        addEvent("Save file was corrupted and skipped.");
        return;
    }
    if (!save) return;

    coins = save.coins ?? coins;
    days = save.days ?? days;
    minuscoins = save.minuscoins ?? minuscoins;
    population = save.population ?? population;
    basePopulationPS = save.basePopulationPS ?? basePopulationPS;
    populationPS = basePopulationPS;

    cps1 = save.cps1 ?? cps1;
    cps2 = save.cps2 ?? cps2;
    cps3 = save.cps3 ?? cps3;
    cps4 = save.cps4 ?? cps4;
    cps5 = save.cps5 ?? cps5;
    cps6 = save.cps6 ?? cps6;
    cps7 = save.cps7 ?? cps7;
    cps8 = save.cps8 ?? cps8;
    cps9 = save.cps9 ?? cps9;
    cps10 = save.cps10 ?? cps10

    pollution = save.pollution ?? pollution;
    pollutionPerSecond = save.pollutionPerSecond ?? pollutionPerSecond;
    pollutionReduction = save.pollutionReduction ?? pollutionReduction;
    pollutionLevel = save.pollutionLevel ?? pollutionLevel;

    smallFactories = save.smallFactories ?? smallFactories;
    mediumFactories = save.mediumFactories ?? mediumFactories;
    CoalPlants = save.CoalPlants ?? CoalPlants;
    bigFactories = save.bigFactories ?? bigFactories;
    oilCount = save.oilCount ?? oilCount;
    oilIncomeBonus = save.oilIncomeBonus ?? (oilCount * 0.01);
    populationMultiplier = save.populationMultiplier ?? (1 + (population / 500) * 0.01);
    policyMultiplierBonus = save.policyMultiplierBonus ?? policyMultiplierBonus;
    recalculateMultiplier();
    Nuclears = save.Nuclears ?? Nuclears;

    milestoneIndex = save.milestoneIndex ?? milestoneIndex;
    eventLog = save.eventLog ?? eventLog;

    industrialLastUsedDay = save.industrialLastUsedDay ?? industrialLastUsedDay;
    transportLastUsedDay = save.transportLastUsedDay ?? transportLastUsedDay;
    grantsLastUsedDay = save.grantsLastUsedDay ?? grantsLastUsedDay;

    upgradeCost = save.upgradeCost ?? upgradeCost;
    MarketCost = save.MarketCost ?? MarketCost;
    BMarketCost = save.BMarketCost ?? BMarketCost;
    CoalCost = save.CoalCost ?? CoalCost;
    SfactoryCost = save.SfactoryCost ?? SfactoryCost;
    MfactoryCost = save.MfactoryCost ?? MfactoryCost;
    BfactoryCost = save.BfactoryCost ?? BfactoryCost;
    OilCost = save.OilCost ?? OilCost;
    NuclearCost = save.NuclearCost ?? NuclearCost;
    Nuclear2Cost = save.Nuclear2Cost ?? Nuclear2Cost;
    pCoinsCost = save.pCoinsCost ?? pCoinsCost;
    FarmCost = save.FarmCost ?? FarmCost;
    MPCost = save.MPCost ?? MPCost;
    MPCost2 = save.MPCost2 ?? MPCost2;
    MPCost3 = save.MPCost3 ?? MPCost3;
}


// income tick
setInterval(() => {
    const baseIncome =
        cps1 + cps2 + cps3 + cps4 + cps5 +
        cps6 + cps7 + cps8 + cps9 + cps10 + cps11;

    coins += Math.floor(baseIncome * incomeMultiplier);
    checkMilestones();
    updateUI();
}, 1000);

// pollution tick
setInterval(() => {
    pollution += pollutionPerSecond - pollutionReduction; // фабрики минус очистка
    if (pollution < 0) pollution = 0;

    // уровень загрязнения и штрафы
    let newLevel = Math.floor(pollution / 5);
    if (newLevel > pollutionLevel) {
        minuscoins += (newLevel - pollutionLevel);
        pollutionLevel = newLevel;
    }
    if (pollution >= 100) {
    enableSmoke();
} else {
    disableSmoke();
}

    updateUI();
}, 5000);

// days & fines
setInterval(() => {
    days++;
    if (days % 10 === 0) {
        const oldCoins = coins;
        coins -= minuscoins;
        if (coins < 0) coins = 0;
        const paid = oldCoins - coins;
        addEvent(`City taxes paid: -${formatNum(paid)} coins.`);
        minuscoins += 30;
    }
    updateUI();
}, 10000);




//random
setInterval(() => {
    population += populationPS;
    if (population < 0) population = 0;
    updateUI();

    
    let baseChance = 0.02; 
    let extra = (pollution * 0.002) - (pollutionReduction * 0.01);

    let chance = Math.max(0, Math.min(0.5, baseChance + extra));

    if (pollution < 10) {
    chance = 0;
    }
    if (Math.random() < chance) {
        addEvent("Emergency fine for toxic air: -1000 coins.");
        coins = Math.max(0, coins - 1000);
        updateUI();
    }
}, 5000);


// dont pollute system 1 (маленькие заводы)
setInterval(() => {
    if (pollution >= 100 && smallFactories > 0) {
        if (Math.random() < 0.8) {
            addEvent("Government closed 1 Small Factory.");
            smallFactories--;
            cps4 = smallFactories * 10;
            pollutionPerSecond = Math.max(0, pollutionPerSecond - 1);
            updateUI();
        }
    }

    if (pollution >= 200 && mediumFactories > 0) {
        if (Math.random() < 0.8) {
            addEvent("Government closed 1 Medium Factory.");
            mediumFactories--;
            cps5 = mediumFactories * 20;
            pollutionPerSecond = Math.max(0, pollutionPerSecond - 2);
            updateUI();
        }
    }

    if (pollution >= 70 && CoalPlants > 0) {
        if (Math.random() < 0.7) {
            addEvent("Government closed 1 Coal Plant.");
            CoalPlants--;
            cps9 = CoalPlants * 8;
            pollutionPerSecond = Math.max(0, pollutionPerSecond - 0.5);
            updateUI();
        }
    }

    if (pollution >= 250 && bigFactories > 0) {
        if (Math.random() < 0.7) {
            addEvent("Government closed 1 Big Factory.");
            bigFactories--;
            cps6 = bigFactories * 40;
            pollutionPerSecond = Math.max(0, pollutionPerSecond - 3);
            updateUI();
        }
    }

    if (oilCount <= 0) return;
    if (pollution < 200) return;

    let baseChance = 0.04; // 4%
    let pollutionFactor = (pollution - 200) * 0.0015;
    let reductionFactor = pollutionReduction * 0.02;

    let chance = baseChance + pollutionFactor - reductionFactor;
    chance = Math.max(0, Math.min(0.35, chance)); // максимум 35%

    if (Math.random() < chance) {
        addEvent("Government closed 1 Oil Refinery.");
        oilCount--;

        oilIncomeBonus = oilCount * 0.01;
        recalculateMultiplier();
        cps10 = oilCount * 60;
        pollutionPerSecond = Math.max(0, pollutionPerSecond - 6);

        updateUI();
    }

    if (pollution >= 300 && Nuclears > 0) {
        if (Math.random() < 0.7) {
            addEvent("Government closed 1 Nuclear Plant.");
            Nuclears--;
            cps7 = Nuclears * 100;
            pollutionPerSecond = Math.max(0, pollutionPerSecond - 5);
            updateUI();
        }
    }

    //

    if (pollution >= 100 && population > 100) {
    if (Math.random() < 0.5) {
        addEvent("The population is falling (-100 population)");
        population = Math.max(0, population - 100);
        updateUI();
    }
}

    if (coins >= 50000) {
        if (Math.random() < 0.1) { 
            addEvent("Governement decide that you are too rich (+20 taxs)")
            minuscoins += 20
            updateUI()
        }
    }

    if (Nuclears >= 1 && population >= 2000) {
        if (Math.random() < 0.01) {
            addEvent("Your Nuclear Power Plant exploded!!!")
            pollution += 300
            minuscoins += 50
            population -= 1000
            triggerReactorExplosionEffect();
        }
    }
}, 15000);

//population
setInterval(() => {
    if (pollution < 10) {
        populationPS = basePopulationPS;
    } else if (pollution < 50) {
        populationPS = basePopulationPS - 10;
    } else if (pollution < 100) {
        populationPS = basePopulationPS - 25;
    } else {
        populationPS = -50;
    }
}, 5000);

setInterval(() => {
    // 1000 населения = +1%
    populationMultiplier = 1 + (population / 500) * 0.01;
    recalculateMultiplier();
}, 1000);

function updateBackground() {
    document.body.className = "";

    if (pollution < 15) {
        document.body.classList.add("clean");
    } else if (pollution < 45) {
        document.body.classList.add("lesspolluted");
    } else if (pollution < 80) {
        document.body.classList.add("polluted");
    } else if (pollution < 150) {
        document.body.classList.add("lessdirty");
    } else if (pollution < 300) {
        document.body.classList.add("dirty");
    } else if (pollution < 500){
        document.body.classList.add("toxic");
    } else {
        document.body.classList.add("dead");
    }
}

const smoke = document.getElementById("smoke");
let smokeActive = false;

function enableSmoke() {
    if (smokeActive) return;
    smokeActive = true;
    smoke.style.display = "block";

    for (let i = 0; i < 15; i++) {
        const p = document.createElement("div");
        p.className = "smoke-particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = 8 + Math.random() * 6 + "s";
        p.style.animationDelay = Math.random() * 5 + "s";
        smoke.appendChild(p);
    }
}

function disableSmoke() {
    smokeActive = false;
    smoke.style.display = "none";
    smoke.innerHTML = "";
}

// UI
function updateUI() {
    const baseIncome = cps1 + cps2 + cps3 + cps4 + cps5 + cps6 + cps7 + cps8 + cps9 + cps10 + cps11;
    const ecoStatus =
        pollution < 15 ? "Clean" :
        pollution < 45 ? "Stable" :
        pollution < 80 ? "Warning" :
        pollution < 150 ? "High Risk" :
        pollution < 300 ? "Critical" :
        pollution < 500 ? "Toxic" : "Dead Zone";

    document.getElementById("coins").textContent = formatNum(coins);
    document.getElementById("days").textContent = days;
    document.getElementById("minuscoins").textContent = formatNum(minuscoins);
    document.getElementById("pollution").textContent = pollution.toFixed(1);
    document.getElementById("pollutionReduction").textContent = pollutionReduction.toFixed(1);

    document.getElementById("perSecond").textContent = formatNum(Math.floor(baseIncome * incomeMultiplier));
    document.getElementById("multiplier").textContent = incomeMultiplier.toFixed(2);

    document.getElementById("pollutionPerSec").textContent = pollutionPerSecond.toFixed(1);

    document.getElementById("upgradeCost").textContent = upgradeCost;
    document.getElementById("MarketCost").textContent = MarketCost;
    document.getElementById("BMarketCost").textContent = BMarketCost;
    document.getElementById("CoalCost").textContent = CoalCost;
    document.getElementById("SfactoryCost").textContent = SfactoryCost;
    document.getElementById("MfactoryCost").textContent = MfactoryCost;
    document.getElementById("BfactoryCost").textContent = BfactoryCost;
    document.getElementById("OilCost").textContent = OilCost;
    document.getElementById("NuclearCost").textContent = NuclearCost;
    document.getElementById("Nuclear2Cost").textContent = Nuclear2Cost;
    document.getElementById("pCoinsCost").textContent = pCoinsCost;
    document.getElementById("FarmCost").textContent = FarmCost
    document.getElementById("MPCost").textContent = MPCost;
    document.getElementById("MPCost2").textContent = MPCost2;
    document.getElementById("MPCost3").textContent = MPCost3;
    document.getElementById("population").textContent = formatNum(population);
    document.getElementById("populationPS").textContent = populationPS;
    document.getElementById("coalCount").textContent = CoalPlants;
    document.getElementById("smallFactoryCount").textContent = smallFactories;
    document.getElementById("mediumFactoryCount").textContent = mediumFactories;
    document.getElementById("bigFactoryCount").textContent = bigFactories;
    document.getElementById("oilCount").textContent = oilCount;
    document.getElementById("nuclearCount").textContent = Nuclears;

    const next = milestoneIndex < milestones.length ? formatNum(milestones[milestoneIndex]) : "MAX";
    document.getElementById("nextMilestone").textContent = next;
    document.getElementById("ecoStatus").textContent = ecoStatus;
    document.getElementById("pollutionMeter").style.width = `${Math.min(100, (pollution / 500) * 100)}%`;
    document.getElementById("eventLog").innerHTML = eventLog
        .map((item) => `<div class="event-item">${item}</div>`)
        .join("");

    document.getElementById("upgradeBtn").disabled = coins < upgradeCost;
    document.getElementById("MarketBtn").disabled = coins < MarketCost;
    document.getElementById("BMarketBtn").disabled = coins < BMarketCost;
    document.getElementById("CoalBtn").disabled = coins < CoalCost;
    document.getElementById("SfactoryBtn").disabled = coins < SfactoryCost;
    document.getElementById("MfactoryBtn").disabled = coins < MfactoryCost;
    document.getElementById("BfactoryBtn").disabled = coins < BfactoryCost;
    document.getElementById("OilBtn").disabled = coins < OilCost;
    document.getElementById("NuclearBtn").disabled = coins < NuclearCost;
    document.getElementById("Nuclear2Btn").disabled = coins < Nuclear2Cost;
    document.getElementById("pCoinsBtn").disabled = coins < pCoinsCost;
    document.getElementById("FarmBtn").disabled = coins < FarmCost
    document.getElementById("MPBtn").disabled = coins < MPCost;
    document.getElementById("MPBtn2").disabled = coins < MPCost2;
    document.getElementById("MPBtn3").disabled = coins < MPCost3;

    const industrialReady = canUsePolicy(industrialLastUsedDay);
    const transportReady = canUsePolicy(transportLastUsedDay);
    const grantsReady = canUsePolicy(grantsLastUsedDay) && coins >= 50000;

    document.getElementById("policyIndustrial").disabled = !industrialReady;
    document.getElementById("policyTransport").disabled = !transportReady;
    document.getElementById("policyGrants").disabled = !grantsReady;

    const statusParts = [];
    if (!industrialReady) statusParts.push(`Industrial Support: ${policyCooldownLeft(industrialLastUsedDay)}d`);
    if (!transportReady) statusParts.push(`Public Transport: ${policyCooldownLeft(transportLastUsedDay)}d`);
    if (!canUsePolicy(grantsLastUsedDay)) statusParts.push(`Business Grants: ${policyCooldownLeft(grantsLastUsedDay)}d`);
    if (canUsePolicy(grantsLastUsedDay) && coins < 50000) statusParts.push("Business Grants: need 50,000 coins");
    document.getElementById("policyStatus").textContent = statusParts.join(" | ");
    updateBackground();

}

loadGame();
if (eventLog.length === 0) {
    addEvent("Mayor briefing: grow the city, keep pollution under control.");
}
const loadingScreen = document.getElementById("loadingScreen");
window.addEventListener("load", () => {
    setTimeout(() => loadingScreen.classList.add("hidden"), 150);
});
const ecoStatusEl = document.getElementById("ecoStatus");
let ecoClicks = 0;
ecoStatusEl.addEventListener("click", () => {
    ecoClicks++;
    if (ecoClicks === 7) {
        addEvent("Easter egg: the air whispers back.");
        updateUI();
        ecoClicks = 0;
    }
});
const infoToggle = document.getElementById("infoToggle");
const infoPanel = document.getElementById("infoPanel");
infoToggle.addEventListener("click", () => {
    const isOpen = infoPanel.classList.toggle("open");
    infoToggle.setAttribute("aria-expanded", String(isOpen));
});

const categoryBar = document.getElementById("categoryBar");
const categoryButtons = categoryBar.querySelectorAll("button[data-filter]");
const buildingButtons = document.querySelectorAll(".button-grid button[data-category]");

function setCategoryFilter(filter) {
    categoryButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.filter === filter);
    });
    buildingButtons.forEach((btn) => {
        const show = filter === "all" || btn.dataset.category === filter;
        btn.style.display = show ? "" : "none";
    });
}

categoryButtons.forEach((btn) => {
    btn.addEventListener("click", () => setCategoryFilter(btn.dataset.filter));
});
function saveGame() {
    if (!allowSave) return;

    const save = {
        coins,
        days,
        minuscoins,
        population,
        basePopulationPS,
        populationPS,
        cps1, cps2, cps3, cps4, cps5, cps6, cps7, cps8, cps9, cps10, cps11,
        pollution,
        pollutionPerSecond,
        pollutionReduction,
        pollutionLevel,
        smallFactories,
        mediumFactories,
        CoalPlants,
        bigFactories,
        oilCount,
        Nuclears,
        incomeMultiplier,
        oilIncomeBonus,
        populationMultiplier,
        policyMultiplierBonus,
        eventLog,
        milestoneIndex,
        industrialLastUsedDay,
        transportLastUsedDay,
        grantsLastUsedDay,
        upgradeCost,
        MarketCost,
        BMarketCost,
        CoalCost,
        SfactoryCost,
        MfactoryCost,
        BfactoryCost,
        OilCost,
        NuclearCost,
        Nuclear2Cost,
        pCoinsCost,
        FarmCost,
        MPCost,
        MPCost2,
        MPCost3
    };

    localStorage.setItem("idleGameSave", JSON.stringify(save));
}

updateUI();

setInterval(saveGame, 5000);
window.addEventListener("beforeunload", saveGame);

</script>
