<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoIdle.Idle</title>
  <style>
    body {
      background-color: rgb(90, 90, 90);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

    body.clean {
    background-color: #5a8f5a;
}

body.lesspolluted {
    background-color: #658f2a;
}

body.polluted {
    background-color: #7a7a3a;
}

body.lessdirty {
    background-color: #7a613a;
}
body.dirty {
    background-color: #5f4a3a;
}

body.toxic {
    background-color: #3a3a3a;
}
body.dead {
    background-color: rgb(34, 34, 34);
}

    .smoke {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 2;
      filter: blur(2px);
    }

    .smoke span {
      position: absolute;
      bottom: -30%;
      width: 50vmin;
      height: 50vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 200, 200, 0.35) 0%, rgba(200, 200, 200, 0.15) 35%, rgba(200, 200, 200, 0) 70%);
      animation: smokeRise 12s linear infinite;
      transform: translateX(-50%);
    }

    .smoke span:nth-child(1) {
      left: 20%;
      animation-duration: 14s;
      animation-delay: -2s;
      width: 55vmin;
      height: 55vmin;
    }

    .smoke span:nth-child(2) {
      left: 55%;
      animation-duration: 11s;
      animation-delay: -5s;
      width: 45vmin;
      height: 45vmin;
    }

    .smoke span:nth-child(3) {
      left: 80%;
      animation-duration: 16s;
      animation-delay: -9s;
      width: 60vmin;
      height: 60vmin;
    }

    @keyframes smokeRise {
      0% {
        transform: translate(-50%, 0) scale(0.9);
        opacity: 0;
      }
      15% {
        opacity: 0.55;
      }
      100% {
        transform: translate(-50%, -120%) scale(1.35);
        opacity: 0;
      }
    }

    body.lessdirty .smoke {
      opacity: 0.35;
    }

    body.dirty .smoke {
      opacity: 0.55;
    }

    body.toxic .smoke {
      opacity: 0.75;
    }

    body.dead .smoke {
      opacity: 0.9;
    }


    h1 {
      font-family: Arial, Helvetica, sans-serif;
      text-shadow: 3px 3px 0 #00000043;
      color: white;
      margin-bottom: 5px;
    }

    h5 {
      color: #dddddd;
      margin-bottom: 10px;
    }

    #splash {
      margin-bottom: 25px;
      color: #ffd54f;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #00000055;
    }

    button {
      width: 100%;
      padding: 10px 17px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      background: #4caf50;
      color: white;
      text-shadow: 3px 3px 0 #00000055;
      box-shadow: 3px 3px 0 #00000055;
    }

    a {
      width: 200px;
      text-decoration: none;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background-color: rgb(90, 90, 90);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 1000;
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="loadingScreen" class="loading-screen">Loading...</div>
  <div class="smoke" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h5>Version: alpha 0.6.26</h5>
  <h1 id="title">EcoIdle.Idle</h1>
  <div id="splash"></div>

  <a href="index.html"><button>Start</button></a>
  <a href
  ="Info.html"><button>Info [recomended]</button></a>

  <script>
    const loadingScreen = document.getElementById("loadingScreen");
    window.addEventListener("load", () => {
      setTimeout(() => loadingScreen.classList.add("hidden"), 150);
    });

    document.querySelectorAll("a[href]").forEach((link) => {
      link.addEventListener("click", () => {
        loadingScreen.classList.remove("hidden");
      });
    });

    const splashes = [
      "Save the planet!",
      "Now with pollution!",
      "Idle but not useless!",
      "Trees are OP",
      "Coal is temporary",
      "Eco update when?",
      "Totally not Minecraft",
      "Green energy moment",
      "Alpha but playable",
      "Nature clicks back",
      "Why are you playing this?",
      "Who create this?",
      "STOP POLLUTING!",
      "Read the info NOW!",
      "The planet is watching you",
      "No planet B",
      "Idle with consequences",
      "You did this.",
      "Bigger numbers, bigger problems",
      "Speedrunning climate change",
      "Clean energy wins late game",
      "Not finished, like the planet",
      "Optimization or collapse?",
      "Capitalism moment"

    ];

    const splash = document.getElementById("splash");
    splash.textContent = splashes[Math.floor(Math.random() * splashes.length)];

    const rareSplashes = [
  "The planet remembers your choices.",
  "This run is canon.",
  "There was another way.",
  "You optimized too far."
];

const normalSplashes = [
  "Save the planet!",
  "Idle but not useless!",
  "Trees are OP",
  "STOP POLLUTING!",
  "Nature clicks back",
  "Bigger numbers, bigger problems",
      "Speedrunning climate change",
      "Clean energy wins late game",
      "Not finished, like the planet",
      "Optimization or collapse?",
      "Capitalism moment",
      "WHAT DID YOU DONE??"
];

const roll = Math.random();

if (roll < 0.01) {
  splash.textContent = rareSplashes[Math.floor(Math.random() * rareSplashes.length)];
} else {
  splash.textContent = normalSplashes[Math.floor(Math.random() * normalSplashes.length)];
}

    const title = document.getElementById("title");
    let titleClicks = 0;
    title.addEventListener("click", () => {
      titleClicks++;
      if (titleClicks === 5) {
        splash.textContent = "Secret: the trees are awake.";
        titleClicks = 0;
      }
    });

    const secretWord = "ECO";
    let buffer = "";
    window.addEventListener("keydown", (e) => {
      if (!e.key || e.key.length !== 1) return;
      buffer = (buffer + e.key.toUpperCase()).slice(-secretWord.length);
      if (buffer === secretWord) {
        splash.textContent = "Easter egg: green code unlocked.";
      }
    });

    const r = Math.random();

if (r < 0.1) {
  document.body.classList.add("clean");
} else if (r < 0.24) {
  document.body.classList.add("lesspolluted");
} else if (r < 0.38) {
  document.body.classList.add("polluted");
} else if (r < 0.52) {
  document.body.classList.add("lessdirty");
} else if (r < 0.66) {
  document.body.classList.add("dirty");
} else if (r < 0.8) {
  document.body.classList.add("toxic");
} else {
  document.body.classList.add("dead");
}

  </script>

</body>
</html>
