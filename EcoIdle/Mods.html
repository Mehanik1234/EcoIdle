<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mods</title>

<style>
body {
    background-color: rgb(90, 90, 90);
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    position: relative;
    overflow: hidden;
}

body.clean {
    background-color: #5a8f5a;
    --ambient-color: rgba(255, 255, 255, 0.55);
}

body.lesspolluted {
    background-color: #658f2a;
    --ambient-color: rgba(255, 255, 255, 0.5);
}

body.polluted {
    background-color: #7a7a3a;
    --ambient-color: rgba(255, 225, 180, 0.35);
}

body.lessdirty {
    background-color: #7a613a;
    --ambient-color: rgba(240, 220, 200, 0.3);
}
body.dirty {
    background-color: #5f4a3a;
    --ambient-color: rgba(210, 210, 210, 0.25);
}

body.toxic {
    background-color: #3a3a3a;
    --ambient-color: rgba(200, 200, 200, 0.22);
}
body.dead {
    background-color: rgb(34, 34, 34);
    --ambient-color: rgba(190, 190, 190, 0.2);
}

body:not(.loaded) h1,
body:not(.loaded) .mods {
    opacity: 0;
    transform: translateY(10px);
    filter: blur(2px);
}

body.loaded h1 {
    animation: fadeUp 0.6s ease forwards 0.05s;
}

body.loaded .mods {
    animation: fadeUp 0.7s ease forwards 0.12s;
}

.ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 0;
    overflow: hidden;
}

body.clean .ambient,
body.lesspolluted .ambient,
body.polluted .ambient,
body.lessdirty .ambient,
body.dirty .ambient,
body.toxic .ambient,
body.dead .ambient {
    opacity: 0.5;
}

body.polluted .ambient,
body.lessdirty .ambient {
    opacity: 0.4;
}

body.dirty .ambient,
body.toxic .ambient,
body.dead .ambient {
    opacity: 0.3;
}

.ambient span {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ambient-color, rgba(255, 255, 255, 0.4));
    filter: blur(0.2px);
    opacity: 0.8;
    animation: ambientDrift 18s linear infinite, ambientTwinkle 4.5s ease-in-out infinite;
    transform: translate3d(0, 0, 0);
}

.leaves {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 1;
    overflow: hidden;
}

body.clean .leaves,
body.lesspolluted .leaves {
    opacity: 0.9;
}

.leaf {
    position: absolute;
    top: -10%;
    width: 20px;
    height: 12px;
    background: radial-gradient(circle at 30% 30%, #a7e16f 0%, #7dcf4c 55%, #4f9f2f 100%);
    border-radius: 0 60% 60% 60%;
    transform-origin: center;
    opacity: 0.75;
    animation: leafFall linear infinite;
    filter: drop-shadow(0 2px 1px rgba(0,0,0,0.25));
}

.leaf::before {
    content: "";
    position: absolute;
    left: 55%;
    top: 10%;
    width: 2px;
    height: 80%;
    background: rgba(255,255,255,0.35);
    transform: rotate(20deg);
    border-radius: 2px;
}

.smoke {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 2;
    filter: blur(2px);
}

.smoke span {
    position: absolute;
    bottom: -30%;
    width: 50vmin;
    height: 50vmin;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 200, 200, 0.35) 0%, rgba(200, 200, 200, 0.15) 35%, rgba(200, 200, 200, 0) 70%);
    animation: smokeRise 12s linear infinite;
    transform: translateX(-50%);
}

.smoke span:nth-child(1) {
    left: 20%;
    animation-duration: 14s;
    animation-delay: -2s;
    width: 55vmin;
    height: 55vmin;
}

.smoke span:nth-child(2) {
    left: 55%;
    animation-duration: 11s;
    animation-delay: -5s;
    width: 45vmin;
    height: 45vmin;
}

.smoke span:nth-child(3) {
    left: 80%;
    animation-duration: 16s;
    animation-delay: -9s;
    width: 60vmin;
    height: 60vmin;
}

body.lessdirty .smoke {
    opacity: 0.35;
}

body.dirty .smoke {
    opacity: 0.55;
}

body.toxic .smoke {
    opacity: 0.75;
}

body.dead .smoke {
    opacity: 0.9;
}

.mods {
    width: min(640px, 92vw);
    background: linear-gradient(145deg, #2e2e2e, #3a3a3a);
    border-radius: 20px;
    padding: 26px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    position: relative;
    z-index: 3;
}

h1 {
    margin-top: 0;
    text-align: center;
    text-shadow: 2px 2px 0 #00000055;
}

.tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
}

.custom-mods {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
}

.tabs button {
    flex: 1;
    padding: 8px 6px;
    margin-top: 0;
    font-size: 13px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
}

.tabs button.active {
    background: #4caf50;
    border-color: #4caf50;
}

.mods-list {
    max-height: 350px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.mod {
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.2);
}

.mod-title {
    font-weight: bold;
}

.mod-desc {
    font-size: 13px;
    opacity: 0.8;
    margin: 5px 0;
}

.mod-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
}

button {
    position: relative;
    overflow: hidden;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4caf50;
    color: white;
    text-shadow: 2px 2px 0 #00000055;
    box-shadow: 3px 3px 0 #00000055;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
}

button::after {
    content: "";
    position: absolute;
    inset: -40% -60%;
    background: linear-gradient(110deg, transparent 35%, rgba(255, 255, 255, 0.35) 50%, transparent 65%);
    transform: translateX(-120%) rotate(15deg);
    opacity: 0;
    transition: transform 0.6s ease, opacity 0.6s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 4px 4px 0 #00000055;
    filter: brightness(1.05);
}

button:hover::after {
    transform: translateX(120%) rotate(15deg);
    opacity: 0.6;
}

button:active {
    transform: translateY(1px);
    box-shadow: 2px 2px 0 #00000055;
}

button.secondary {
    background: #777;
}

button.danger {
    background: #d94d4d;
}

.back {
    margin-top: 12px;
    width: 100%;
}

@keyframes fadeUp {
    0% { opacity: 0; transform: translateY(10px); filter: blur(2px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}

@keyframes ambientDrift {
    0% { transform: translate(-5vw, 10vh) scale(0.8); }
    50% { transform: translate(5vw, 50vh) scale(1); }
    100% { transform: translate(-3vw, 110vh) scale(0.9); }
}

@keyframes ambientTwinkle {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.9; }
}

@keyframes leafFall {
    0% { transform: translate(-10vw, -10vh) rotate(0deg); }
    50% { transform: translate(10vw, 50vh) rotate(140deg); }
    100% { transform: translate(-8vw, 115vh) rotate(280deg); }
}

@keyframes smokeRise {
    0% { transform: translate(-50%, 0) scale(0.9); opacity: 0; }
    15% { opacity: 0.55; }
    100% { transform: translate(-50%, -120%) scale(1.35); opacity: 0; }
}

@media (max-width: 640px) {
    body {
        padding: 40px 0;
    }

    .mods {
        padding: 20px 16px;
        border-radius: 16px;
    }

    .mods-list {
        max-height: 300px;
    }

    .mod-actions {
        flex-wrap: wrap;
    }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}
</style>

</head>
<body>

<div class="ambient" aria-hidden="true">
    <span style="left: 8%; animation-duration: 16s; animation-delay: -3s; transform: scale(0.8);"></span>
    <span style="left: 18%; animation-duration: 21s; animation-delay: -9s; transform: scale(1.0);"></span>
    <span style="left: 28%; animation-duration: 19s; animation-delay: -7s; transform: scale(0.9);"></span>
    <span style="left: 38%; animation-duration: 24s; animation-delay: -12s; transform: scale(1.1);"></span>
    <span style="left: 48%; animation-duration: 17s; animation-delay: -5s; transform: scale(0.85);"></span>
    <span style="left: 58%; animation-duration: 23s; animation-delay: -11s; transform: scale(1.05);"></span>
    <span style="left: 68%; animation-duration: 20s; animation-delay: -6s; transform: scale(0.95);"></span>
    <span style="left: 78%; animation-duration: 26s; animation-delay: -14s; transform: scale(1.15);"></span>
    <span style="left: 88%; animation-duration: 22s; animation-delay: -10s; transform: scale(0.9);"></span>
    <span style="left: 95%; animation-duration: 18s; animation-delay: -4s; transform: scale(0.85);"></span>
</div>
<div class="leaves" aria-hidden="true">
    <span class="leaf" style="left: 5%; animation-duration: 14s; animation-delay: -2s; transform: rotate(20deg) scale(0.9);"></span>
    <span class="leaf" style="left: 18%; animation-duration: 17s; animation-delay: -6s; transform: rotate(-10deg) scale(1.1);"></span>
    <span class="leaf" style="left: 32%; animation-duration: 13s; animation-delay: -4s; transform: rotate(35deg) scale(0.8);"></span>
    <span class="leaf" style="left: 48%; animation-duration: 19s; animation-delay: -8s; transform: rotate(5deg) scale(1.0);"></span>
    <span class="leaf" style="left: 63%; animation-duration: 15s; animation-delay: -3s; transform: rotate(-25deg) scale(0.9);"></span>
    <span class="leaf" style="left: 77%; animation-duration: 18s; animation-delay: -7s; transform: rotate(15deg) scale(1.15);"></span>
    <span class="leaf" style="left: 90%; animation-duration: 16s; animation-delay: -5s; transform: rotate(-5deg) scale(0.95);"></span>
</div>
<div class="smoke" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="mods">
    <h1>Mods</h1>

    <div class="tabs">
        <button class="active" onclick="switchTab('installed', event)">Installed</button>
        <button onclick="switchTab('available', event)">Available</button>
    </div>
    <div class="custom-mods">
        <button class="secondary" onclick="promptCustomMod()">Add Custom Mod (JSON)</button>
    </div>

    <div id="modsList" class="mods-list"></div>

    <button class="back" onclick="goBack()">Back</button>
</div>

<script src="mods.js"></script>
<script>

let currentTab = "installed";

function getModsByTab(tab) {
    const mods = window.getEcoModsWithState ? window.getEcoModsWithState() : [];
    return tab === "installed"
        ? mods.filter((mod) => mod.installed)
        : mods.filter((mod) => !mod.installed);
}

function renderMods() {
    const list = document.getElementById("modsList");
    list.innerHTML = "";

    const mods = getModsByTab(currentTab);

    if (mods.length === 0) {
        list.innerHTML = "<div style='opacity:0.6'>No mods</div>";
        return;
    }

    mods.forEach(mod => {
        const el = document.createElement("div");
        el.className = "mod";

        el.innerHTML = `
            <div class="mod-title">${mod.name}</div>
            <div class="mod-desc">${mod.description || "No description"}</div>
            <div class="mod-actions">
                ${getButtons(mod)}
            </div>
        `;

        list.appendChild(el);
    });
}

function getButtons(mod) {
    if (currentTab === "available") {
        return `<button onclick="installMod('${mod.id}')">Install</button>`;
    }

    const toggleLabel = mod.enabled ? "Disable" : "Enable";
    return `
        <button onclick="toggleMod('${mod.id}')">${toggleLabel}</button>
        <button class="danger" onclick="deleteMod('${mod.id}')">Delete</button>
    `;
}

function switchTab(tab, ev) {
    currentTab = tab;

    document.querySelectorAll(".tabs button").forEach(btn => {
        btn.classList.remove("active");
    });

    if (ev && ev.target) {
        ev.target.classList.add("active");
    }

    renderMods();
}

function installMod(id) {
    if (window.updateEcoModState) {
        window.updateEcoModState(id, { installed: true, enabled: false });
    }
    renderMods();
}

function toggleMod(id) {
    if (!window.getEcoModState || !window.updateEcoModState) return;
    const state = window.getEcoModState();
    const current = state[id] || {};
    window.updateEcoModState(id, { installed: true, enabled: !current.enabled });
    renderMods();
}

function deleteMod(id) {
    const mods = window.getEcoModsWithState ? window.getEcoModsWithState() : [];
    const mod = mods.find((item) => item.id === id);
    if (mod && mod.custom && window.removeEcoCustomMod) {
        window.removeEcoCustomMod(id);
    } else if (window.updateEcoModState) {
        window.updateEcoModState(id, { installed: false, enabled: false });
    }
    renderMods();
}

function goBack() {
    window.location.href = "lobby.html";
}

function promptCustomMod() {
    if (!window.addEcoCustomMod || !window.updateEcoModState) {
        alert("Custom mods are not available.");
        return;
    }
    const input = prompt("Paste mod JSON here:");
    if (!input) return;
    let data;
    try {
        data = JSON.parse(input);
    } catch {
        alert("Invalid JSON.");
        return;
    }
    const mod = window.addEcoCustomMod(data);
    if (!mod) {
        alert("Invalid mod data.");
        return;
    }
    window.updateEcoModState(mod.id, { installed: true, enabled: false });
    renderMods();
    alert(`Mod added: ${mod.name}`);
}

function setRandomBackground() {
    const r = Math.random();
    document.body.classList.remove("clean", "lesspolluted", "polluted", "lessdirty", "dirty", "toxic", "dead");
    if (r < 0.1) {
        document.body.classList.add("clean");
    } else if (r < 0.24) {
        document.body.classList.add("lesspolluted");
    } else if (r < 0.38) {
        document.body.classList.add("polluted");
    } else if (r < 0.52) {
        document.body.classList.add("lessdirty");
    } else if (r < 0.66) {
        document.body.classList.add("dirty");
    } else if (r < 0.8) {
        document.body.classList.add("toxic");
    } else {
        document.body.classList.add("dead");
    }
}

window.addEventListener("load", () => {
    document.body.classList.add("loaded");
});

setRandomBackground();
renderMods();
</script>

</body>
</html>
