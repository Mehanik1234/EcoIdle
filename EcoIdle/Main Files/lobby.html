<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoIdle.Idle</title>
  <style>
    body {
      background-color: rgb(90, 90, 90);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

body.clean {
    background-color: #5a8f5a;
    --ambient-color: rgba(255, 255, 255, 0.55);
}

body.lesspolluted {
    background-color: #658f2a;
    --ambient-color: rgba(255, 255, 255, 0.5);
}

body.polluted {
    background-color: #7a7a3a;
    --ambient-color: rgba(255, 225, 180, 0.35);
}

body.lessdirty {
    background-color: #7a613a;
    --ambient-color: rgba(240, 220, 200, 0.3);
}
body.dirty {
    background-color: #5f4a3a;
    --ambient-color: rgba(210, 210, 210, 0.25);
}

body.toxic {
    background-color: #3a3a3a;
    --ambient-color: rgba(200, 200, 200, 0.22);
}
    body.dead {
    background-color: rgb(34, 34, 34);
    --ambient-color: rgba(190, 190, 190, 0.2);
}

    body:not(.loaded) h5,
    body:not(.loaded) h1,
    body:not(.loaded) #splash,
    body:not(.loaded) a button {
      opacity: 0;
      transform: translateY(10px);
      filter: blur(2px);
    }

    body.loaded h5 {
      animation: fadeUp 0.6s ease forwards 0.05s;
    }

    body.loaded h1 {
      animation: fadeUp 0.7s ease forwards 0.12s, titleGlow 5.5s ease-in-out infinite 0.9s, titleFloat 6s ease-in-out infinite 1.2s;
    }

    body.loaded #splash {
      animation: fadeUp 0.7s ease forwards 0.22s, splashFlicker 4s ease-in-out infinite 1.1s;
    }

    body.loaded a:nth-of-type(1) button {
      animation: fadeUp 0.7s ease forwards 0.35s;
    }

    body.loaded a:nth-of-type(2) button {
      animation: fadeUp 0.7s ease forwards 0.45s;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 0;
      overflow: hidden;
    }

    body.clean .ambient,
    body.lesspolluted .ambient,
    body.polluted .ambient,
    body.lessdirty .ambient,
    body.dirty .ambient,
    body.toxic .ambient,
    body.dead .ambient {
      opacity: 0.5;
    }

    body.polluted .ambient,
    body.lessdirty .ambient {
      opacity: 0.4;
    }

    body.dirty .ambient,
    body.toxic .ambient,
    body.dead .ambient {
      opacity: 0.3;
    }

    .ambient span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ambient-color, rgba(255, 255, 255, 0.4));
      filter: blur(0.2px);
      opacity: 0.8;
      animation: ambientDrift 18s linear infinite, ambientTwinkle 4.5s ease-in-out infinite;
      transform: translate3d(0, 0, 0);
    }

    .leaves {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 1;
      overflow: hidden;
    }

    body.clean .leaves,
    body.lesspolluted .leaves {
      opacity: 0.9;
    }

    .leaf {
      position: absolute;
      top: -10%;
      width: 20px;
      height: 12px;
      background: radial-gradient(circle at 30% 30%, #a7e16f 0%, #7dcf4c 55%, #4f9f2f 100%);
      border-radius: 0 60% 60% 60%;
      transform-origin: center;
      opacity: 0.75;
      animation: leafFall linear infinite;
      filter: drop-shadow(0 2px 1px rgba(0,0,0,0.25));
    }

    .leaf::before {
      content: "";
      position: absolute;
      left: 55%;
      top: 10%;
      width: 2px;
      height: 80%;
      background: rgba(255,255,255,0.35);
      transform: rotate(20deg);
      border-radius: 2px;
    }

    @keyframes leafFall {
      0% {
        transform: translate(-10vw, -10vh) rotate(0deg);
      }
      50% {
        transform: translate(10vw, 50vh) rotate(140deg);
      }
      100% {
        transform: translate(-8vw, 115vh) rotate(280deg);
      }
    }

    .smoke {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 2;
      filter: blur(2px);
    }

    .smoke span {
      position: absolute;
      bottom: -30%;
      width: 50vmin;
      height: 50vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 200, 200, 0.35) 0%, rgba(200, 200, 200, 0.15) 35%, rgba(200, 200, 200, 0) 70%);
      animation: smokeRise 12s linear infinite;
      transform: translateX(-50%);
    }

    .smoke span:nth-child(1) {
      left: 20%;
      animation-duration: 14s;
      animation-delay: -2s;
      width: 55vmin;
      height: 55vmin;
    }

    .smoke span:nth-child(2) {
      left: 55%;
      animation-duration: 11s;
      animation-delay: -5s;
      width: 45vmin;
      height: 45vmin;
    }

    .smoke span:nth-child(3) {
      left: 80%;
      animation-duration: 16s;
      animation-delay: -9s;
      width: 60vmin;
      height: 60vmin;
    }

    @keyframes smokeRise {
      0% {
        transform: translate(-50%, 0) scale(0.9);
        opacity: 0;
      }
      15% {
        opacity: 0.55;
      }
      100% {
        transform: translate(-50%, -120%) scale(1.35);
        opacity: 0;
      }
    }

    body.lessdirty .smoke {
      opacity: 0.35;
    }

    body.dirty .smoke {
      opacity: 0.55;
    }

    body.toxic .smoke {
      opacity: 0.75;
    }

    body.dead .smoke {
      opacity: 0.9;
    }


    h1 {
      font-family: Arial, Helvetica, sans-serif;
      text-shadow: 3px 3px 0 #00000043;
      color: white;
      margin-bottom: 5px;
    }

    h5 {
      color: #dddddd;
      margin-bottom: 10px;
    }

    #splash {
      margin-bottom: 25px;
      color: #ffd54f;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #00000055;
    }

    button {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 10px 17px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      background: #4caf50;
      color: white;
      text-shadow: 3px 3px 0 #00000055;
      box-shadow: 3px 3px 0 #00000055;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    button::after {
      content: "";
      position: absolute;
      inset: -40% -60%;
      background: linear-gradient(110deg, transparent 35%, rgba(255, 255, 255, 0.35) 50%, transparent 65%);
      transform: translateX(-120%) rotate(15deg);
      opacity: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 4px 4px 0 #00000055;
      filter: brightness(1.05);
    }

    button:hover::after {
      transform: translateX(120%) rotate(15deg);
      opacity: 0.6;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 2px 2px 0 #00000055;
    }

    a:focus-visible button {
      outline: 2px solid rgba(255, 255, 255, 0.6);
      outline-offset: 3px;
    }

    a {
      width: min(240px, 88vw);
      text-decoration: none;
    }

    .save-slots {
      width: min(560px, 92vw);
      display: none;
      gap: 12px;
      margin: 10px 0 20px;
      z-index: 3;
    }

    .save-slots.open {
      display: grid;
    }

    .save-slot {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 3px 3px 0 #00000055;
      text-align: left;
    }

    .save-slot.empty {
      opacity: 0.85;
    }

    .save-slot.active {
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.6), 0 0 12px rgba(255, 255, 255, 0.18);
    }

    .save-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .save-title {
      font-weight: 700;
      color: #ffffff;
      font-size: 17px;
    }

    .save-desc {
      margin: 6px 0 4px;
      font-size: 13px;
      color: #f1f1f1;
      opacity: 0.9;
      min-height: 18px;
    }

    .save-meta {
      font-size: 12px;
      color: #f1f1f1;
      opacity: 0.8;
    }

    .save-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .save-slot button {
      width: auto;
      margin-top: 0;
      padding: 6px 12px;
      font-size: 13px;
    }

    .menu-actions {
      width: min(240px, 88vw);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 3;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background-color: rgb(90, 90, 90);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 1000;
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    .loading-screen::after {
      content: "";
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.35);
      border-top-color: rgba(255, 255, 255, 0.95);
      margin-left: 12px;
      animation: loadingSpin 0.9s linear infinite;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 35%, rgba(255,255,255,0) 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.12s ease;
    }

    .flash.active {
      opacity: 1;
    }

    @keyframes shake {
      0% { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-4px, 2px) rotate(-0.4deg); }
      20% { transform: translate(3px, -3px) rotate(0.5deg); }
      30% { transform: translate(-3px, -2px) rotate(-0.3deg); }
      40% { transform: translate(4px, 3px) rotate(0.3deg); }
      50% { transform: translate(-2px, 2px) rotate(-0.2deg); }
      60% { transform: translate(3px, -1px) rotate(0.2deg); }
      70% { transform: translate(-4px, 1px) rotate(-0.4deg); }
      80% { transform: translate(2px, -2px) rotate(0.3deg); }
      90% { transform: translate(-2px, 2px) rotate(-0.2deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    body.shake {
      animation: shake 0.6s linear 3;
    }

    .explosion {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 998;
    }

    .explosion.active {
      opacity: 1;
      animation: explosionFade 1.8s ease-out forwards;
    }

    .explosion::before,
    .explosion::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 55%;
      width: 20vmin;
      height: 20vmin;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }

    .explosion::before {
      background: radial-gradient(circle, rgba(255, 240, 200, 0.95) 0%, rgba(255, 150, 60, 0.85) 35%, rgba(180, 60, 20, 0.3) 60%, rgba(0, 0, 0, 0) 70%);
      animation: fireball 0.7s ease-out forwards;
    }

    .explosion::after {
      border: 3px solid rgba(255, 210, 140, 0.95);
      box-shadow: 0 0 35px rgba(255, 170, 90, 0.85);
      animation: blastRing 1.2s ease-out forwards;
    }

    @keyframes fireball {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0.2; }
      40% { transform: translate(-50%, -50%) scale(2.4); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(4.8); opacity: 0; }
    }

    @keyframes blastRing {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    @keyframes explosionFade {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(10px); filter: blur(2px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes titleGlow {
      0%, 100% {
        text-shadow: 3px 3px 0 #00000043, 0 0 0 rgba(255, 255, 255, 0);
      }
      50% {
        text-shadow: 3px 3px 0 #00000043, 0 0 10px rgba(255, 255, 255, 0.35);
      }
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes splashFlicker {
      0%, 100% {
        opacity: 1;
        text-shadow: 2px 2px 0 #00000055;
      }
      50% {
        opacity: 0.85;
        text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.35);
      }
    }

    @keyframes loadingSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes ambientDrift {
      0% { transform: translate(-5vw, 10vh) scale(0.8); }
      50% { transform: translate(5vw, 50vh) scale(1); }
      100% { transform: translate(-3vw, 110vh) scale(0.9); }
    }

    @keyframes ambientTwinkle {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.9; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <audio id="bgmusic" src="bgmusic.mp3" loop autoplay></audio>

  <div id="loadingScreen" class="loading-screen">Loading...</div>
  <div id="flash" class="flash" aria-hidden="true"></div>
  <div id="explosion" class="explosion" aria-hidden="true"></div>
  <div class="ambient" aria-hidden="true">
    <span style="left: 8%; animation-duration: 16s; animation-delay: -3s; transform: scale(0.8);"></span>
    <span style="left: 18%; animation-duration: 21s; animation-delay: -9s; transform: scale(1.0);"></span>
    <span style="left: 28%; animation-duration: 19s; animation-delay: -7s; transform: scale(0.9);"></span>
    <span style="left: 38%; animation-duration: 24s; animation-delay: -12s; transform: scale(1.1);"></span>
    <span style="left: 48%; animation-duration: 17s; animation-delay: -5s; transform: scale(0.85);"></span>
    <span style="left: 58%; animation-duration: 23s; animation-delay: -11s; transform: scale(1.05);"></span>
    <span style="left: 68%; animation-duration: 20s; animation-delay: -6s; transform: scale(0.95);"></span>
    <span style="left: 78%; animation-duration: 26s; animation-delay: -14s; transform: scale(1.15);"></span>
    <span style="left: 88%; animation-duration: 22s; animation-delay: -10s; transform: scale(0.9);"></span>
    <span style="left: 95%; animation-duration: 18s; animation-delay: -4s; transform: scale(0.85);"></span>
  </div>
  <div class="leaves" aria-hidden="true">
    <span class="leaf" style="left: 5%; animation-duration: 14s; animation-delay: -2s; transform: rotate(20deg) scale(0.9);"></span>
    <span class="leaf" style="left: 18%; animation-duration: 17s; animation-delay: -6s; transform: rotate(-10deg) scale(1.1);"></span>
    <span class="leaf" style="left: 32%; animation-duration: 13s; animation-delay: -4s; transform: rotate(35deg) scale(0.8);"></span>
    <span class="leaf" style="left: 48%; animation-duration: 19s; animation-delay: -8s; transform: rotate(5deg) scale(1.0);"></span>
    <span class="leaf" style="left: 63%; animation-duration: 15s; animation-delay: -3s; transform: rotate(-25deg) scale(0.9);"></span>
    <span class="leaf" style="left: 77%; animation-duration: 18s; animation-delay: -7s; transform: rotate(15deg) scale(1.15);"></span>
    <span class="leaf" style="left: 90%; animation-duration: 16s; animation-delay: -5s; transform: rotate(-5deg) scale(0.95);"></span>
  </div>
  <div class="smoke" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h5>Version: beta 0.9.26</h5>
  <h1 id="title">EcoIdle</h1>
  <div id="splash"></div>

  <div class="save-slots" id="saveSlots" aria-label="Save slots">
    <div class="save-slot" data-slot="1">
      <div class="save-top">
        <div class="save-title" data-role="title">Slot 1</div>
        <button type="button" data-action="play">&#1048;&#1075;&#1088;&#1072;&#1090;&#1100;</button>
      </div>
      <div class="save-desc" data-role="desc">No description</div>
      <div class="save-meta" data-role="meta">Empty</div>
      <div class="save-actions">
        <button type="button" data-action="edit">Edit</button>
      </div>
    </div>

    <div class="save-slot" data-slot="2">
      <div class="save-top">
        <div class="save-title" data-role="title">Slot 2</div>
        <button type="button" data-action="play">&#1048;&#1075;&#1088;&#1072;&#1090;&#1100;</button>
      </div>
      <div class="save-desc" data-role="desc">No description</div>
      <div class="save-meta" data-role="meta">Empty</div>
      <div class="save-actions">
        <button type="button" data-action="edit">Edit</button>
      </div>
    </div>

    <div class="save-slot" data-slot="3">
      <div class="save-top">
        <div class="save-title" data-role="title">Slot 3</div>
        <button type="button" data-action="play">&#1048;&#1075;&#1088;&#1072;&#1090;&#1100;</button>
      </div>
      <div class="save-desc" data-role="desc">No description</div>
      <div class="save-meta" data-role="meta">Empty</div>
      <div class="save-actions">
        <button type="button" data-action="edit">Edit</button>
      </div>
    </div>
  </div>

  <div class="menu-actions">
    <button type="button" id="mainPlayBtn">&#1048;&#1075;&#1088;&#1072;&#1090;&#1100;</button>
    <a href="Info.html"><button>Info [recomended]</button></a>
    <a href="Mods.html"><button>Mods</button></a>
  </div>

  <script>
    const bgm = document.getElementById("bgmusic");
    if (bgm) {
      bgm.volume = 0.35;
      const tryPlay = () => bgm.play().catch(() => {});
      window.addEventListener("load", tryPlay);
      document.addEventListener("click", tryPlay, { once: true });
      document.addEventListener("keydown", tryPlay, { once: true });
    }

    const loadingScreen = document.getElementById("loadingScreen");
    window.addEventListener("load", () => {
      setTimeout(() => {
        loadingScreen.classList.add("hidden");
        document.body.classList.add("loaded");
      }, 150);
    });

    document.querySelectorAll("a[href]").forEach((link) => {
      link.addEventListener("click", () => {
        loadingScreen.classList.remove("hidden");
      });
    });

    const splashes = [
      "Save the planet!",
      "Now with pollution!",
      "Idle but not useless!",
      "Trees are OP",
      "Coal is temporary",
      "Eco update when?",
      "Totally not Minecraft",
      "Green energy moment",
      "Alpha but playable",
      "Nature clicks back",
      "Why are you playing this?",
      "Who create this?",
      "STOP POLLUTING!",
      "Read the info NOW!",
      "The planet is watching you",
      "No planet B",
      "Idle with consequences",
      "You did this.",
      "Bigger numbers, bigger problems",
      "Speedrunning climate change",
      "Clean energy wins late game",
      "Not finished, like the planet",
      "Optimization or collapse?",
      "Capitalism moment"

    ];

    const splash = document.getElementById("splash");
    splash.textContent = splashes[Math.floor(Math.random() * splashes.length)];

    const rareSplashes = [
  "The planet remembers your choices.",
  "This run is canon.",
  "There was another way.",
  "You optimized too far."
];

const normalSplashes = [
  "Save the planet!",
  "Idle but not useless!",
  "Trees are OP",
  "STOP POLLUTING!",
  "Nature clicks back",
  "Bigger numbers, bigger problems",
      "Speedrunning climate change",
      "Clean energy wins late game",
      "Not finished, like the planet",
      "Optimization or collapse?",
      "Capitalism moment",
      "WHAT DID YOU DONE??"
];

const roll = Math.random();

if (roll < 0.01) {
  splash.textContent = rareSplashes[Math.floor(Math.random() * rareSplashes.length)];
} else {
  splash.textContent = normalSplashes[Math.floor(Math.random() * normalSplashes.length)];
}

    const title = document.getElementById("title");
    let titleClicks = 0;
    title.addEventListener("click", () => {
      titleClicks++;
      if (titleClicks === 5) {
        splash.textContent = "Secret: the trees are awake.";
        titleClicks = 0;
      }
    });

    const secretWord = "ECO";
    let buffer = "";
    window.addEventListener("keydown", (e) => {
      if (!e.key || e.key.length !== 1) return;
      buffer = (buffer + e.key.toUpperCase()).slice(-secretWord.length);
      if (buffer === secretWord) {
        splash.textContent = "Easter egg: green code unlocked.";
      }
    });

    const r = Math.random();

if (r < 0.1) {
  document.body.classList.add("clean");
} else if (r < 0.24) {
  document.body.classList.add("lesspolluted");
} else if (r < 0.38) {
  document.body.classList.add("polluted");
} else if (r < 0.52) {
  document.body.classList.add("lessdirty");
} else if (r < 0.66) {
  document.body.classList.add("dirty");
} else if (r < 0.8) {
  document.body.classList.add("toxic");
} else {
  document.body.classList.add("dead");
}

    const nuclearChance = 0.05;
    const flash = document.getElementById("flash");
    const explosion = document.getElementById("explosion");

    function triggerNuclearEvent() {
      document.body.classList.add("shake");
      if (flash) {
        flash.classList.add("active");
        setTimeout(() => flash.classList.remove("active"), 220);
      }
      if (explosion) {
        explosion.classList.add("active");
        setTimeout(() => explosion.classList.remove("active"), 1800);
      }
      setTimeout(() => {
        document.body.classList.remove("shake");
      }, 2000);
    }

    if (Math.random() < nuclearChance) {
      setTimeout(triggerNuclearEvent, 450);
    }

    const SAVE_SLOTS = 3;
    const SAVE_KEY_PREFIX = "idleGameSave_slot";
    const ACTIVE_SLOT_KEY = "idleGameActiveSlot";
    const LEGACY_SAVE_KEY = "idleGameSave";
    const META_KEY = "idleGameSlotsMeta";
    const slotsRoot = document.getElementById("saveSlots");
    const mainPlayBtn = document.getElementById("mainPlayBtn");

    function clampSlot(value) {
      const slot = Number.parseInt(value, 10);
      if (!Number.isFinite(slot)) return 1;
      return Math.min(SAVE_SLOTS, Math.max(1, slot));
    }

    function getSaveKey(slot) {
      return `${SAVE_KEY_PREFIX}${slot}`;
    }

    function migrateLegacySave() {
      const legacy = localStorage.getItem(LEGACY_SAVE_KEY);
      if (!legacy) return;
      const slot1Key = getSaveKey(1);
      if (!localStorage.getItem(slot1Key)) {
        localStorage.setItem(slot1Key, legacy);
      }
      localStorage.removeItem(LEGACY_SAVE_KEY);
      if (!localStorage.getItem(ACTIVE_SLOT_KEY)) {
        localStorage.setItem(ACTIVE_SLOT_KEY, "1");
      }
    }

    function loadMeta() {
      let meta = [];
      try {
        meta = JSON.parse(localStorage.getItem(META_KEY) || "[]");
      } catch {
        meta = [];
      }
      if (!Array.isArray(meta)) meta = [];
      for (let i = 0; i < SAVE_SLOTS; i++) {
        if (!meta[i]) meta[i] = {};
        if (typeof meta[i].name !== "string" || !meta[i].name.trim()) {
          meta[i].name = `Slot ${i + 1}`;
        }
        if (typeof meta[i].description !== "string") {
          meta[i].description = "";
        }
      }
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      return meta;
    }

    function saveMeta(meta) {
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    }

    function getSlotSave(slot) {
      const raw = localStorage.getItem(getSaveKey(slot));
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "0";
      return Math.floor(value).toLocaleString("en-US");
    }

    function renderSlots() {
      if (!slotsRoot) return;
      const meta = loadMeta();
      const activeSlot = clampSlot(localStorage.getItem(ACTIVE_SLOT_KEY) || 1);
      slotsRoot.querySelectorAll(".save-slot").forEach((slotEl) => {
        const slot = clampSlot(slotEl.dataset.slot);
        const info = meta[slot - 1];
        const save = getSlotSave(slot);
        const titleEl = slotEl.querySelector("[data-role='title']");
        const descEl = slotEl.querySelector("[data-role='desc']");
        const metaEl = slotEl.querySelector("[data-role='meta']");

        if (titleEl) titleEl.textContent = info.name;
        if (descEl) descEl.textContent = info.description || "No description";

        if (!save) {
          slotEl.classList.add("empty");
          if (metaEl) metaEl.textContent = "Empty - new game";
        } else {
          slotEl.classList.remove("empty");
          const coins = formatNumber(save.coins ?? 0);
          const days = Number.isFinite(save.days) ? save.days : 0;
          const pollution = Number.isFinite(save.pollution) ? save.pollution : 0;
          let metaText = `Coins: ${coins} | Days: ${days} | Pollution: ${pollution.toFixed(1)}`;
          if (save.savedAt) {
            const savedAt = new Date(save.savedAt);
            if (!Number.isNaN(savedAt.getTime())) {
              metaText += ` | Saved: ${savedAt.toLocaleString()}`;
            }
          }
          if (metaEl) metaEl.textContent = metaText;
        }

        slotEl.classList.toggle("active", slot === activeSlot);
      });
    }

    if (slotsRoot) {
      slotsRoot.addEventListener("click", (event) => {
        const actionBtn = event.target.closest("button[data-action]");
        if (!actionBtn) return;
        const slotEl = actionBtn.closest(".save-slot");
        if (!slotEl) return;
        const slot = clampSlot(slotEl.dataset.slot);

        if (actionBtn.dataset.action === "play") {
          localStorage.setItem(ACTIVE_SLOT_KEY, String(slot));
          loadingScreen.classList.remove("hidden");
          window.location.href = "index.html";
          return;
        }

        if (actionBtn.dataset.action === "edit") {
          const meta = loadMeta();
          const current = meta[slot - 1] || { name: `Slot ${slot}`, description: "" };
          const newName = prompt("Save name:", current.name || `Slot ${slot}`);
          if (newName === null) return;
          const newDesc = prompt("Save description:", current.description || "");
          if (newDesc === null) return;
          meta[slot - 1] = {
            name: newName.trim() || `Slot ${slot}`,
            description: newDesc.trim()
          };
          saveMeta(meta);
          renderSlots();
        }
      });
    }

    if (mainPlayBtn && slotsRoot) {
      mainPlayBtn.addEventListener("click", () => {
        slotsRoot.classList.add("open");
        slotsRoot.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    migrateLegacySave();
    renderSlots();

  </script>

</body>
</html>
